<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Responsive Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nature & Architecture Exploration</h1>
    </header>

    <main class="grid-container">
        <figure>
            <img src="https://picsum.photos/id/10/800/600" alt="A peaceful lake reflecting pine trees under a clear sky">
            <figcaption><p>Nature provides a sense of tranquility that is hard to find in the bustling city life.</p></figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/1018/800/600" alt="Jagged mountain peaks covered in snow during sunset">
            <figcaption><p>The mountains stand as silent giants, witnessing the passage of time across the horizon.</p></figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/1031/800/600" alt="Dense forest with sunlight streaming through the canopy">
            <figcaption><p>Walking through the forest allows us to reconnect with the roots of our existence.</p></figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/1043/800/600" alt="Modern glass skyscraper reflecting the blue sky">
            <figcaption><p>Architecture is a testament to human ingenuity and our desire to reach the clouds.</p></figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/1048/800/600" alt="An old stone bridge over a small winding river">
            <figcaption><p>History is built stone by stone, creating paths that connect our past to the future.</p></figcaption>
        </figure>
    </main>
</body>
</html>
